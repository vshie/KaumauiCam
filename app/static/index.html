<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1628" />
    <title>Kaumaui Cam</title>
    <script>
      (function () {
        var p = location.pathname;
        if (p !== "/" && !p.endsWith("/")) p += "/";
        window.__KM_PREFIX = p;
      })();
    </script>
    <link rel="stylesheet" href="" id="km-css" />
    <script>
      document.getElementById("km-css").href = window.__KM_PREFIX + "static/styles.css";
    </script>
  </head>
  <body>
    <script type="text/x-template" id="km-app-template">
      <div class="vue-root">
        <header class="site-header">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div class="brand-text">
              <h1>Kaumaui Cam</h1>
              <p class="tagline">Live view · PTZ · stream & record</p>
            </div>
          </div>
          <nav class="tabs" aria-label="Main">
            <button type="button" class="tab-btn" :class="{ active: tab === 'live' }" @click="tab = 'live'">Live</button>
            <button type="button" class="tab-btn" :class="{ active: tab === 'stream' }" @click="tab = 'stream'">Streaming</button>
            <button type="button" class="tab-btn" :class="{ active: tab === 'rec' }" @click="tab = 'rec'">Recordings</button>
            <button type="button" class="tab-btn" :class="{ active: tab === 'settings' }" @click="tab = 'settings'">Settings</button>
          </nav>
        </header>
        <main>
          <div v-if="bannerText" :class="['banner', bannerClass]">{{ bannerText }}</div>

          <section v-show="tab === 'live'" class="tab-panel">
            <div class="grid grid-2">
              <div class="panel panel-accent">
                <h2>Preview <span class="badge">WebRTC · livepreview</span></h2>
                <div class="video-wrap">
                  <video ref="liveVideo" playsinline autoplay muted></video>
                </div>
                <div class="row row-actions">
                  <button type="button" class="btn btn-secondary" @click="startWebRTC">Connect video</button>
                  <button type="button" class="btn btn-secondary" @click="stopWebRTC">Disconnect</button>
                </div>
                <p class="status-line">{{ webrtcStatus }}</p>
              </div>
              <div class="panel">
                <h2>PTZ</h2>
                <p class="status-line">{{ ptzReadout }}</p>
                <div class="ptz-pad">
                  <span class="blank"></span>
                  <button type="button" class="ptz-dir" @mousedown.prevent="ptzMove(0,40,0)" @mouseup="ptzStop" @mouseleave="ptzStop" @touchstart.prevent="ptzMove(0,40,0)" @touchend="ptzStop" aria-label="Tilt up">▲</button>
                  <span class="blank"></span>
                  <button type="button" class="ptz-dir" @mousedown.prevent="ptzMove(-40,0,0)" @mouseup="ptzStop" @mouseleave="ptzStop" @touchstart.prevent="ptzMove(-40,0,0)" @touchend="ptzStop" aria-label="Pan left">◀</button>
                  <button type="button" class="btn-secondary ptz-stop" @click="ptzStop" aria-label="Stop">■</button>
                  <button type="button" class="ptz-dir" @mousedown.prevent="ptzMove(40,0,0)" @mouseup="ptzStop" @mouseleave="ptzStop" @touchstart.prevent="ptzMove(40,0,0)" @touchend="ptzStop" aria-label="Pan right">▶</button>
                  <span class="blank"></span>
                  <button type="button" class="ptz-dir" @mousedown.prevent="ptzMove(0,-40,0)" @mouseup="ptzStop" @mouseleave="ptzStop" @touchstart.prevent="ptzMove(0,-40,0)" @touchend="ptzStop" aria-label="Tilt down">▼</button>
                  <span class="blank"></span>
                </div>
                <div class="row">
                  <button type="button" class="btn btn-secondary" @mousedown.prevent="ptzMove(0,0,-30)" @mouseup="ptzStop" @mouseleave="ptzStop">Zoom −</button>
                  <button type="button" class="btn btn-secondary" @mousedown.prevent="ptzMove(0,0,30)" @mouseup="ptzStop" @mouseleave="ptzStop">Zoom +</button>
                </div>
                <div class="row row-actions">
                  <button type="button" class="btn btn-secondary" @click="api('POST','/api/ptz/home',{})">Home preset</button>
                  <button type="button" class="btn btn-secondary" @click="api('POST','/api/ptz/autofocus',{on:true})">AF on</button>
                  <button type="button" class="btn btn-secondary" @click="api('POST','/api/ptz/autofocus',{on:false})">AF off</button>
                </div>
              </div>
            </div>
          </section>

          <section v-show="tab === 'stream'" class="tab-panel">
            <div class="panel">
              <h2>YouTube Live</h2>
              <p class="status-line">Uses dedicated <code>youtubelive</code> camera profile (H.264 1080p30, MBR 4.5 Mbps), stream-copied to YouTube with a silent AAC audio track — no re-encoding on the Pi.</p>
              <label>Stream key (paste from YouTube Studio → Stream)</label>
              <textarea v-model="ytKey" placeholder="xxxx-xxxx-xxxx-xxxx"></textarea>
              <schedule-editor v-model="draftYt" />
              <div class="row">
                <button type="button" class="btn" @click="saveYoutube">Save</button>
                <button type="button" class="btn" @click="startYoutubeNow">Start now</button>
                <button type="button" class="btn btn-danger" @click="stopYoutube">Stop</button>
              </div>
              <h2 class="h2-spaced">Bandwidth <span class="badge badge-muted">Starlink</span></h2>
              <p class="status-line">{{ bwText }}</p>
              <div class="bar"><div :style="{ width: bwBarPct + '%' }"></div></div>
              <p class="status-line">{{ ytStderr }}</p>
              <h2 class="h2-spaced">Broadcast history <span class="badge badge-muted">last 24h</span></h2>
              <p class="status-line hint" v-if="!streamSessions.length">No sessions in the last 24 hours.</p>
              <div class="table-wrap" v-if="streamSessions.length">
                <table>
                  <thead>
                    <tr>
                      <th>Started (Pacific/Honolulu)</th>
                      <th>Duration</th>
                      <th>Bytes</th>
                      <th>Outcome</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="s in streamSessions" :key="s.session_id" :class="sessionRowClass(s)">
                      <td>{{ formatHonoluluTs(s.started_ts) }}</td>
                      <td>{{ formatSessionDuration(s) }}</td>
                      <td>{{ fmtBytes(s.bytes || 0) }}</td>
                      <td :title="s.last_stderr || ''">{{ formatSessionOutcome(s) }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <section v-show="tab === 'rec'" class="tab-panel">
            <div class="panel">
              <h2>Scheduled recordings</h2>
              <label>Storage</label>
              <select v-model="recStorage">
                <option value="auto">Auto (USB if mounted, else SD)</option>
                <option value="usb">USB only</option>
                <option value="sd">SD (/app/data) only</option>
              </select>
              <label>Stream profile (URL param)</label>
              <input type="text" v-model="recProfile" />
              <schedule-editor v-model="draftRec" />
              <div class="row">
                <button type="button" class="btn" @click="saveRecordings">Save</button>
                <button type="button" class="btn" @click="recordNow">Record now</button>
                <button type="button" class="btn btn-danger" @click="stopRecord">Stop recording</button>
              </div>
              <p class="status-line">{{ recStatusLine }}</p>
              <h2 class="h2-spaced">Files</h2>
              <p class="status-line hint">Recordings are saved as 5-minute MP4 segments while the session is active.</p>
              <div class="row">
                <button
                  type="button"
                  class="btn btn-danger"
                  :disabled="!recFiles.length"
                  @click="deleteAllRec"
                >Delete all recordings</button>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Size</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="f in recFiles" :key="f.name">
                      <td>{{ f.name }}</td>
                      <td>{{ fmtBytes(f.size) }}</td>
                      <td>
                        <a :href="kmUrl('/api/recordings/download/' + encodeURIComponent(f.name))">Download</a>
                        ·
                        <button type="button" class="link-del" @click="deleteRec(f.name)">Delete</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <section v-show="tab === 'settings'" class="tab-panel">
            <div class="panel">
              <h2>Camera</h2>
              <div class="row">
                <div>
                  <label>Host</label>
                  <input type="text" v-model="camHost" />
                </div>
                <div>
                  <label>User</label>
                  <input type="text" v-model="camUser" />
                </div>
                <div>
                  <label>Password</label>
                  <input type="password" v-model="camPass" />
                </div>
              </div>
              <h2 class="h2-spaced">Quota</h2>
              <label>Monthly quota (GB, 0 = no bar cap)</label>
              <input type="number" v-model.number="quotaGb" step="0.1" min="0" />
              <label>Assumed overhead on top of ffmpeg counter (%)</label>
              <input type="number" v-model.number="overheadPct" step="0.5" min="0" max="50" />
              <div class="row">
                <button type="button" class="btn" @click="saveSettings">Save settings</button>
                <button type="button" class="btn btn-secondary" @click="resetBw">Reset month bandwidth counter</button>
                <button type="button" class="btn btn-secondary" @click="applyFishpond">Apply DefaultFishpond H.265 1080p15</button>
                <button type="button" class="btn btn-secondary" @click="applyYoutubelive">Apply youtubelive H.264 1080p30 4.5 Mbps</button>
              </div>
              <p class="status-line">Month counter resets automatically at local midnight on the 1st (by calendar month sum).</p>
            </div>
          </section>
        </main>
        <footer class="site-footer" role="contentinfo">
          <div class="footer-logos">
            <span class="footer-logo" title="HuiHoʻoleimaluō">
              <img :src="kmUrl('static/assets/hui_logo.png')" alt="HuiHoʻoleimaluō" class="footer-img footer-img-hui" width="320" height="70" loading="lazy" decoding="async" />
            </span>
            <a class="footer-logo footer-logo-br" href="https://bluerobotics.com/" target="_blank" rel="noopener noreferrer" title="Blue Robotics">
              <img :src="kmUrl('static/assets/blue_robotics_logo.png')" alt="Blue Robotics" class="footer-img footer-img-br" width="260" height="46" loading="lazy" decoding="async" />
            </a>
          </div>
        </footer>
      </div>
    </script>

    <script type="text/x-template" id="km-sched-editor-template">
      <div class="schedule-block sched-editor">
        <h3>Weekly schedule (15-minute blocks)</h3>
        <p class="status-line sched-time-line">
          Current Pacific/Honolulu time: <strong>{{ honoluluNowText }}</strong>
        </p>
        <p class="status-line">
          Paint the timeline when streaming or recording should run. The same pattern applies to each active weekday below.
        </p>
        <div class="sched-top-row">
          <label class="sched-check-label sched-en-row">
            <input type="checkbox" :checked="modelValue.enabled" @change="emitSched({ enabled: $event.target.checked })" />
            Schedule enabled
          </label>
          <button type="button" class="btn btn-secondary sched-clear-btn" @click="clearAll">Clear schedule</button>
        </div>
        <div class="sched-grid" @mouseleave="endDrag" @mouseup="endDrag">
          <div
            v-for="(h, hi) in hourLabels"
            :key="'r' + hi"
            class="sched-ruler-hour"
            :style="{ gridColumn: (hi * 4 + 1) + ' / span 4' }"
          >
            <span class="sched-ruler-label">{{ h }}</span>
            <span class="sched-ruler-tick" aria-hidden="true"></span>
          </div>
          <div class="sched-ruler-end" aria-hidden="true">
            <span class="sched-ruler-label">{{ endLabel }}</span>
            <span class="sched-ruler-tick"></span>
          </div>
          <div
            v-for="idx in visibleSlots"
            :key="idx"
            class="sched-cell"
            :class="{ on: slotSet.has(idx), 'hour-start': (idx % 4) === 0 }"
            @mousedown.prevent.stop="cellDown(idx, $event)"
            @mouseenter="cellEnter(idx)"
          ></div>
        </div>
        <h4 class="sched-sub">Today’s ranges (example)</h4>
        <div class="table-wrap sched-table" v-if="rangesToday.length">
          <table>
            <thead>
              <tr>
                <th>On (Pacific/Honolulu)</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(line, ri) in rangesToday" :key="ri">
                <td>{{ line }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p v-else class="status-line">No blocks selected.</p>
        <h4 class="sched-sub">Active weekdays</h4>
        <div class="sched-day-pills">
          <button
            type="button"
            v-for="d in ALL_DAYS"
            :key="d"
            class="day-pill"
            :class="{ active: dayActive(d) }"
            @click="toggleDay(d)"
          >
            {{ DAY_LABELS[d] }}
          </button>
        </div>
      </div>
    </script>

    <div id="app"></div>

    <script>
      (function () {
        function loadVueThenBoot() {
          var base = (window.__KM_PREFIX || "/").replace(/\/?$/, "/");
          var s = document.createElement("script");
          s.src = base + "static/vendor/vue.global.prod.js";
          s.onload = function () {
            bootKaumauiVue();
          };
          s.onerror = function () {
            document.getElementById("app").innerHTML =
              '<p style="padding:1rem;color:#c00">Failed to load Vue. Rebuild the Docker image (vendor/vue.global.prod.js).</p>';
          };
          document.body.appendChild(s);
        }
        function bootKaumauiVue() {
          var Vue = window.Vue;
          if (!Vue || !Vue.createApp) {
            document.getElementById("app").innerHTML = "<p>Vue not available.</p>";
            return;
          }
          var createApp = Vue.createApp;

          function kmUrl(path) {
            var b = (typeof window.__KM_PREFIX === "string" ? window.__KM_PREFIX : "/").replace(/\/?$/, "/");
            return b + String(path || "").replace(/^\/+/, "");
          }

          var ALL_DAYS = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];
          var DAY_LABELS = { mon: "Mon", tue: "Tue", wed: "Wed", thu: "Thu", fri: "Fri", sat: "Sat", sun: "Sun" };
          var SCHEDULE_TIMEZONE = "Pacific/Honolulu";

          function cloneSched(src) {
            src = src || {};
            return {
              enabled: !!src.enabled,
              days: Array.isArray(src.days) && src.days.length ? src.days.slice() : ALL_DAYS.slice(),
              slots: Array.isArray(src.slots) ? src.slots.map(Number).filter(function (n) { return n >= 0 && n < 96; }) : [],
            };
          }

          function fmtMin(min) {
            var h = Math.floor(min / 60);
            var m = min % 60;
            return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
          }

          function mergedRanges(slots) {
            var s = Array.from(new Set(slots))
              .filter(function (i) {
                return i >= 0 && i < 96;
              })
              .sort(function (a, b) {
                return a - b;
              });
            var ranges = [];
            var start = null;
            var prev = null;
            for (var k = 0; k < s.length; k++) {
              var i = s[k];
              if (start === null) {
                start = prev = i;
                continue;
              }
              if (i === prev + 1) {
                prev = i;
                continue;
              }
              ranges.push([start, prev]);
              start = prev = i;
            }
            if (start !== null) ranges.push([start, prev]);
            return ranges.map(function (ab) {
              return fmtMin(ab[0] * 15) + " – " + fmtMin((ab[1] + 1) * 15);
            });
          }

          function formatHonoluluNow(ts) {
            try {
              return new Intl.DateTimeFormat(undefined, {
                timeZone: SCHEDULE_TIMEZONE,
                weekday: "short",
                year: "numeric",
                month: "short",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false,
                timeZoneName: "short",
              }).format(new Date(ts));
            } catch (e) {
              return new Date(ts).toLocaleString();
            }
          }

          var FIRST_IDX = 24; // 06:00
          var SLOT_COUNT = 48; // 12 hours * 4 slots

          var ScheduleEditor = {
            props: { modelValue: { type: Object, required: true } },
            emits: ["update:modelValue"],
            data: function () {
              return {
                dragOn: false,
                paintOn: true,
                nowTick: Date.now(),
                clockTimer: null,
                ALL_DAYS: ALL_DAYS,
                DAY_LABELS: DAY_LABELS,
              };
            },
            computed: {
              slotSet: function () {
                return new Set((this.modelValue.slots || []).map(Number));
              },
              visibleSlots: function () {
                var a = [];
                for (var i = 0; i < SLOT_COUNT; i++) a.push(FIRST_IDX + i);
                return a;
              },
              hourLabels: function () {
                var h0 = Math.floor(FIRST_IDX / 4); // 6
                var n = SLOT_COUNT / 4; // 12 -> 06..17
                var out = [];
                for (var h = 0; h < n; h++) out.push(String(h0 + h).padStart(2, "0"));
                return out;
              },
              endLabel: function () {
                var endHour = Math.floor(FIRST_IDX / 4) + SLOT_COUNT / 4; // 18
                return String(endHour).padStart(2, "0");
              },
              rangesToday: function () {
                return mergedRanges(this.modelValue.slots || []);
              },
              honoluluNowText: function () {
                return formatHonoluluNow(this.nowTick);
              },
            },
            methods: {
              emitSched: function (patch) {
                var v = Object.assign({}, this.modelValue, patch);
                v.slots = (v.slots || []).slice().sort(function (a, b) {
                  return a - b;
                });
                this.$emit("update:modelValue", v);
              },
              cellDown: function (idx, ev) {
                if (ev && ev.button !== undefined && ev.button !== 0) return;
                this.dragOn = true;
                this.paintOn = !this.slotSet.has(idx);
                this.paintCell(idx);
              },
              cellEnter: function (idx) {
                if (!this.dragOn) return;
                this.paintCell(idx);
              },
              endDrag: function () {
                this.dragOn = false;
              },
              paintCell: function (idx) {
                var set = new Set((this.modelValue.slots || []).map(Number));
                if (this.paintOn) set.add(idx);
                else set.delete(idx);
                var arr = Array.from(set).sort(function (a, b) {
                  return a - b;
                });
                this.emitSched({ slots: arr });
              },
              toggleDay: function (d) {
                var order = this.ALL_DAYS;
                var days = (this.modelValue.days || []).slice();
                var j = days.indexOf(d);
                if (j >= 0) {
                  if (days.length <= 1) return;
                  days.splice(j, 1);
                } else {
                  days.push(d);
                  days.sort(function (a, b) {
                    return order.indexOf(a) - order.indexOf(b);
                  });
                }
                this.emitSched({ days: days });
              },
              dayActive: function (d) {
                return (this.modelValue.days || []).indexOf(d) >= 0;
              },
              clearAll: function () {
                if ((this.modelValue.slots || []).length === 0) {
                  this.emitSched({ slots: [] });
                  return;
                }
                if (!confirm("Clear all painted blocks from this schedule?")) return;
                this.emitSched({ slots: [] });
              },
            },
            mounted: function () {
              var self = this;
              this.clockTimer = setInterval(function () {
                self.nowTick = Date.now();
              }, 1000);
              this._mu = function () {
                self.endDrag();
              };
              window.addEventListener("mouseup", this._mu);
            },
            beforeUnmount: function () {
              if (this.clockTimer) clearInterval(this.clockTimer);
              window.removeEventListener("mouseup", this._mu);
            },
            template: "#km-sched-editor-template",
          };

          function loadStoredTab() {
            try {
              var v = window.sessionStorage && sessionStorage.getItem("km.tab");
              if (v && ["live", "stream", "rec", "settings"].indexOf(v) >= 0) return v;
            } catch (e) {}
            return "live";
          }

          function loadStoredDraft(key) {
            try {
              var raw = window.sessionStorage && sessionStorage.getItem("km.draft." + key);
              if (!raw) return null;
              var v = JSON.parse(raw);
              if (v && typeof v === "object") return cloneSched(v);
            } catch (e) {}
            return null;
          }

          function saveStoredDraft(key, sched) {
            try {
              if (window.sessionStorage)
                sessionStorage.setItem("km.draft." + key, JSON.stringify(sched));
            } catch (e) {}
          }

          function clearStoredDraft(key) {
            try {
              window.sessionStorage && sessionStorage.removeItem("km.draft." + key);
            } catch (e) {}
          }

          createApp({
            components: { ScheduleEditor: ScheduleEditor },
            template: "#km-app-template",
            data: function () {
              return {
                tab: loadStoredTab(),
                camHost: "",
                camUser: "",
                camPass: "",
                ytKey: "",
                quotaGb: 100,
                overheadPct: 3,
                recStorage: "auto",
                recProfile: "DefaultFishPond",
                draftYt: cloneSched({}),
                draftRec: cloneSched({}),
                bannerText: "",
                bannerClass: "",
                webrtcStatus: "Disconnected.",
                ptzReadout: "—",
                bwText: "—",
                bwBarPct: 0,
                ytStderr: "Idle.",
                streamSessions: [],
                liveSessionId: null,
                recStatusLine: "—",
                recFiles: [],
                pc: null,
                ptzBackoffMs: 800,
                ptzTimer: null,
              };
            },
            methods: {
              kmUrl: kmUrl,
              encodeURIComponent: encodeURIComponent,
              fmtBytes: function (n) {
                if (n < 1024) return n + " B";
                if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
                if (n < 1073741824) return (n / 1048576).toFixed(1) + " MB";
                return (n / 1073741824).toFixed(2) + " GB";
              },
              api: function (method, path, body) {
                var opt = { method: method, headers: {} };
                if (body !== undefined) {
                  opt.headers["Content-Type"] = "application/json";
                  opt.body = JSON.stringify(body);
                }
                return fetch(kmUrl(path), opt).then(function (r) {
                  return r.text().then(function (t) {
                    var j = null;
                    try {
                      j = JSON.parse(t);
                    } catch (e) {}
                    if (!r.ok) throw new Error((j && j.error) || t || r.statusText);
                    return j;
                  });
                });
              },
              loadConfig: function (opts) {
                var self = this;
                opts = opts || {};
                var useStoredDraft = !opts.force;
                return this.api("GET", "/api/config")
                  .then(function (c) {
                    self.camHost = c.camera_host || "";
                    self.camUser = c.camera_user || "";
                    self.camPass = c.camera_pass || "";
                    self.ytKey = c.youtube_stream_key || "";
                    self.quotaGb = c.monthly_quota_gb != null ? c.monthly_quota_gb : 100;
                    self.overheadPct = c.bandwidth_overhead_pct != null ? c.bandwidth_overhead_pct : 3;
                    self.recStorage = c.recordings_storage || "auto";
                    self.recProfile = c.recordings_profile || "DefaultFishPond";
                    var storedYt = useStoredDraft ? loadStoredDraft("yt") : null;
                    var storedRec = useStoredDraft ? loadStoredDraft("rec") : null;
                    self.draftYt = storedYt || cloneSched(c.youtube_schedule || {});
                    self.draftRec = storedRec || cloneSched(c.recordings_schedule || {});
                  })
                  .catch(function (e) {
                    self.bannerText = "Failed to load config: " + e.message;
                    self.bannerClass = "err";
                    self.draftYt = cloneSched({});
                    self.draftRec = cloneSched({});
                  });
              },
              pollPtz: function () {
                var self = this;
                if (this.tab !== "live") {
                  this.schedulePtz(2000);
                  return;
                }
                this.api("GET", "/api/ptz/position")
                  .then(function (p) {
                    self.ptzReadout =
                      "pan=" + p.pan + " tilt=" + p.tilt + " zoom=" + p.zoom + " autofocus=" + (p.autofocus || "?");
                    self.ptzBackoffMs = 800;
                    self.schedulePtz(800);
                  })
                  .catch(function () {
                    self.ptzReadout = "PTZ unavailable (camera offline)";
                    // Exponential backoff, capped at 30s.
                    self.ptzBackoffMs = Math.min(30000, Math.max(1000, self.ptzBackoffMs * 2));
                    self.schedulePtz(self.ptzBackoffMs);
                  });
              },
              schedulePtz: function (ms) {
                var self = this;
                if (this.ptzTimer) clearTimeout(this.ptzTimer);
                this.ptzTimer = setTimeout(function () {
                  self.pollPtz();
                }, ms);
              },
              pollStream: function () {
                var self = this;
                this.api("GET", "/api/stream/status")
                  .then(function (s) {
                    var b = s.bandwidth || {};
                    var pct = b.quota_bytes ? Math.min(100, (100 * b.month_bytes_adjusted) / b.quota_bytes) : 0;
                    self.bwBarPct = pct;
                    var line = "Month (adj.): " + self.fmtBytes(b.month_bytes_adjusted || 0);
                    if (b.quota_bytes) line += " / " + self.fmtBytes(b.quota_bytes) + " · remaining " + self.fmtBytes(b.remaining_bytes || 0);
                    line += " · today " + self.fmtBytes(b.day_bytes_adjusted || 0);
                    self.bwText = line;
                    if (s.running) self.ytStderr = "Streaming · session " + self.fmtBytes(s.session_bytes || 0);
                    else self.ytStderr = ((s.stderr_tail || []).slice(-5).join(" | ") || "Idle.");
                    self.liveSessionId = (s.running && s.session_id) ? s.session_id : null;
                  })
                  .catch(function () {});
                this.api("GET", "/api/stream/sessions?limit=50")
                  .then(function (r) {
                    self.streamSessions = (r && r.sessions) || [];
                  })
                  .catch(function () {});
              },
              isSessionLive: function (s) {
                return !s.ended_ts && this.liveSessionId && s.session_id === this.liveSessionId;
              },
              formatHonoluluTs: function (ts) {
                if (!ts) return "—";
                return formatHonoluluNow(ts * 1000);
              },
              formatSessionDuration: function (s) {
                var t0 = s.started_ts || 0;
                var t1 = s.ended_ts || (Date.now() / 1000);
                var secs = Math.max(0, Math.round(t1 - t0));
                if (secs < 60) return secs + "s";
                var m = Math.floor(secs / 60);
                var rem = secs % 60;
                if (m < 60) return m + "m " + rem + "s";
                var h = Math.floor(m / 60);
                return h + "h " + (m % 60) + "m";
              },
              formatSessionOutcome: function (s) {
                if (!s.ended_ts) {
                  return this.isSessionLive(s) ? "Running" : "Ended (unknown)";
                }
                var reason = s.end_reason || "ended";
                if (reason === "stopped") return "Stopped (clean)";
                if (reason === "stalled") return "Restarted (stalled)";
                if (reason === "orphaned") return "Ended (orphaned)";
                if (reason === "dns") return "Network: DNS failed";
                if (reason === "rtmp_broken_pipe") return "Network: YouTube dropped us";
                if (reason === "network") return "Network: socket failed";
                if (reason === "rtsp_error") return "Camera: RTSP error";
                if (reason === "died") {
                  var rc = (s.exit_code === null || s.exit_code === undefined) ? "?" : s.exit_code;
                  return "Crashed (rc=" + rc + ")";
                }
                return reason;
              },
              sessionRowClass: function (s) {
                if (!s.ended_ts) {
                  return this.isSessionLive(s) ? "sess-running" : "sess-stopped";
                }
                var r = s.end_reason;
                if (r === "died" || r === "rtsp_error") return "sess-died";
                if (r === "stalled") return "sess-stalled";
                if (r === "dns" || r === "rtmp_broken_pipe" || r === "network") {
                  return "sess-network";
                }
                return "sess-stopped";
              },
              pollRec: function () {
                var self = this;
                this.api("GET", "/api/recordings/status")
                  .then(function (s) {
                    self.recStatusLine =
                      (s.running ? "Recording" : "Idle") +
                      " · " +
                      (s.label || "?") +
                      " · " +
                      (s.dest || "") +
                      (s.error ? " ERR: " + s.error : "");
                    return self.api("GET", "/api/recordings/list");
                  })
                  .then(function (list) {
                    self.recFiles = list.files || [];
                  })
                  .catch(function () {});
              },
              pollStorage: function () {
                var self = this;
                this.api("GET", "/api/storage")
                  .then(function (u) {
                    if (!u.mounted && self.recStorage === "usb") {
                      self.bannerText = "USB not mounted — recordings set to USB only will fail.";
                      self.bannerClass = "warn";
                    } else if (self.bannerClass === "warn") {
                      self.bannerText = "";
                      self.bannerClass = "";
                    }
                  })
                  .catch(function () {});
              },
              ptzMove: function (pan, tilt, zoom) {
                this.api("POST", "/api/ptz/move", { pan: pan, tilt: tilt, zoom: zoom });
              },
              ptzStop: function () {
                this.api("POST", "/api/ptz/stop", {});
              },
              startWebRTC: function () {
                var self = this;
                var vid = this.$refs.liveVideo;
                this.stopWebRTC();
                this.pc = new RTCPeerConnection({ iceServers: [] });
                this.pc.addTransceiver("video", { direction: "recvonly" });
                this.pc.ontrack = function (ev) {
                  if (vid.srcObject !== ev.streams[0]) vid.srcObject = ev.streams[0];
                };
                this.pc
                  .createOffer()
                  .then(function (offer) {
                    return self.pc.setLocalDescription(offer);
                  })
                  .then(function () {
                    return fetch(kmUrl("/go2rtc/api/webrtc?src=livepreview"), {
                      method: "POST",
                      body: self.pc.localDescription.sdp,
                      headers: { "Content-Type": "application/sdp" },
                    });
                  })
                  .then(function (res) {
                    if (!res.ok) return res.text().then(function (t) {
                      throw new Error(t || res.statusText);
                    });
                    return res.text();
                  })
                  .then(function (answerSdp) {
                    return self.pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
                  })
                  .then(function () {
                    self.webrtcStatus = "Connected.";
                  })
                  .catch(function (e) {
                    self.webrtcStatus = "WebRTC error: " + (e && e.message ? e.message : String(e));
                    self.stopWebRTC();
                  });
              },
              stopWebRTC: function () {
                var vid = this.$refs.liveVideo;
                if (this.pc) {
                  try {
                    this.pc.close();
                  } catch (e) {}
                  this.pc = null;
                }
                if (vid && vid.srcObject) {
                  vid.srcObject.getTracks().forEach(function (t) {
                    t.stop();
                  });
                  vid.srcObject = null;
                }
                this.webrtcStatus = "Disconnected.";
              },
              saveYoutube: function () {
                var self = this;
                this.api("POST", "/api/config", {
                  youtube_stream_key: String(this.ytKey || "").trim(),
                  youtube_schedule: this.draftYt,
                }).then(function () {
                  clearStoredDraft("yt");
                  alert("Saved.");
                  self.loadConfig({ force: true });
                });
              },
              startYoutubeNow: function () {
                var self = this;
                this.api("POST", "/api/config", { youtube_stream_key: String(this.ytKey || "").trim() })
                  .then(function () {
                    return self.api("POST", "/api/stream/start", {});
                  })
                  .then(function () {
                    self.pollStream();
                  });
              },
              stopYoutube: function () {
                this.api("POST", "/api/stream/stop", {});
              },
              saveRecordings: function () {
                var self = this;
                this.api("POST", "/api/recordings/config", {
                  schedule: this.draftRec,
                  storage: this.recStorage,
                  profile: String(this.recProfile || "").trim(),
                }).then(function () {
                  clearStoredDraft("rec");
                  alert("Saved.");
                  self.loadConfig({ force: true });
                });
              },
              recordNow: function () {
                var self = this;
                this.api("POST", "/api/recordings/config", {
                  storage: this.recStorage,
                  profile: String(this.recProfile || "").trim(),
                })
                  .then(function () {
                    return self.api("POST", "/api/recordings/start", {});
                  })
                  .then(function () {
                    self.pollRec();
                  });
              },
              stopRecord: function () {
                this.api("POST", "/api/recordings/stop", {});
              },
              deleteRec: function (name) {
                var self = this;
                if (!confirm("Delete " + name + "?")) return;
                this.api("POST", "/api/recordings/delete", { name: name }).then(function () {
                  self.pollRec();
                });
              },
              deleteAllRec: function () {
                var self = this;
                var n = (this.recFiles || []).length;
                if (!n) return;
                var msg =
                  "Delete ALL " +
                  n +
                  " recording" +
                  (n === 1 ? "" : "s") +
                  "? This cannot be undone." +
                  "\n\n(The currently recording segment, if any, is kept.)";
                if (!confirm(msg)) return;
                var typed = prompt('Type "DELETE" to confirm clearing all recordings.');
                if (typed !== "DELETE") {
                  alert("Cancelled — nothing was deleted.");
                  return;
                }
                this.api("POST", "/api/recordings/delete-all", {}).then(function (res) {
                  self.pollRec();
                  if (res && res.errors && res.errors.length) {
                    alert(
                      "Deleted " +
                        (res.deleted || 0) +
                        " file(s); " +
                        res.errors.length +
                        " error(s):\n" +
                        res.errors.join("\n"),
                    );
                  }
                });
              },
              saveSettings: function () {
                var self = this;
                this.api("POST", "/api/config", {
                  camera_host: String(this.camHost || "").trim(),
                  camera_user: String(this.camUser || "").trim(),
                  camera_pass: this.camPass,
                  monthly_quota_gb: parseFloat(this.quotaGb) || 0,
                  bandwidth_overhead_pct: parseFloat(this.overheadPct) || 0,
                }).then(function () {
                  alert("Saved. Reload page if camera IP changed.");
                  self.loadConfig();
                });
              },
              resetBw: function () {
                var self = this;
                if (!confirm("Reset this month's bandwidth counter?")) return;
                this.api("POST", "/api/bandwidth/reset", {}).then(function () {
                  self.pollStream();
                });
              },
              applyFishpond: function () {
                this.api("POST", "/api/camera/ensure-fishpond", {}).then(function () {
                  alert("Applied DefaultFishPond profile parameters on camera.");
                });
              },
              applyYoutubelive: function () {
                this.api("POST", "/api/camera/ensure-youtubelive", {}).then(function (r) {
                  alert((r && r.message) || "Provisioned youtubelive profile on camera.");
                });
              },
            },
            watch: {
              tab: function (v) {
                try {
                  window.sessionStorage && sessionStorage.setItem("km.tab", v);
                } catch (e) {}
                // When the user comes back to Live, try PTZ again immediately.
                if (v === "live") {
                  this.ptzBackoffMs = 800;
                  this.schedulePtz(0);
                }
              },
              draftYt: {
                handler: function (v) {
                  saveStoredDraft("yt", v);
                },
                deep: true,
              },
              draftRec: {
                handler: function (v) {
                  saveStoredDraft("rec", v);
                },
                deep: true,
              },
            },
            mounted: function () {
              var self = this;
              this.loadConfig().then(function () {
                self.pollPtz();
                self.pollStream();
                self.pollRec();
                self.pollStorage();
              });
              setInterval(function () {
                self.pollStream();
              }, 2000);
              setInterval(function () {
                self.pollRec();
              }, 3000);
              setInterval(function () {
                self.pollStorage();
              }, 10000);
            },
          }).mount("#app");
        }
        loadVueThenBoot();
      })();
    </script>
  </body>
</html>
